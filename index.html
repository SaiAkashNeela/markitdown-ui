<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarkItDown</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #6b6b6b;
    --accent: #5c6bc0;
    --accent-hover: #7986cb;
    --success: #4caf50;
    --error: #ef5350;
    --radius: 8px;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  header span {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    overflow: hidden;
  }

  .panel-left {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0;
    overflow-y: auto;
  }

  .panel-right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* Drop zone */
  .dropzone {
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }

  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: rgba(92, 107, 192, 0.05);
  }

  .dropzone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .dropzone-icon {
    font-size: 28px;
    margin-bottom: 10px;
    display: block;
  }

  .dropzone-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .dropzone-text strong {
    color: var(--accent-hover);
    font-weight: 500;
  }

  .file-selected {
    margin-top: 10px;
    font-size: 12px;
    color: var(--success);
    font-family: var(--mono);
    word-break: break-all;
  }

  /* URL input */
  .url-row {
    display: flex;
    gap: 8px;
  }

  .backend-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .backend-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    user-select: none;
  }

  .backend-toggle input {
    accent-color: var(--accent);
  }

  .backend-config {
    display: none;
    flex-direction: column;
    gap: 8px;
  }

  .backend-config.show {
    display: flex;
  }

  .backend-hint {
    font-size: 11px;
    line-height: 1.4;
    color: var(--muted);
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--mono);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder {
    color: var(--muted);
  }

  /* Buttons */
  .btn {
    border: none;
    border-radius: var(--radius);
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--muted); }

  .convert-btn {
    width: 100%;
    padding: 10px;
    font-size: 14px;
  }

  /* Status */
  .status {
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 12px;
    font-family: var(--mono);
    display: none;
  }

  .status.show { display: block; }
  .status.loading { background: rgba(92,107,192,0.1); color: var(--accent-hover); }
  .status.error { background: rgba(239,83,80,0.1); color: var(--error); }
  .status.success { background: rgba(76,175,80,0.1); color: var(--success); }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 1.5px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }

  /* Preview pane */
  .preview-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .preview-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .preview-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .tab-group {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;
  }

  .tab {
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--muted);
    user-select: none;
    transition: background 0.12s, color 0.12s;
  }

  .tab.active {
    background: var(--accent);
    color: #fff;
  }

  .tab:not(.active):hover { color: var(--text); }

  .preview-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .char-count {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .preview-content {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
  }

  .preview-empty {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 8px;
    text-align: center;
  }

  .preview-empty-icon { font-size: 36px; }
  .preview-empty p { font-size: 13px; }

  /* Rendered markdown styles */
  .markdown-body {
    line-height: 1.7;
    color: var(--text);
    max-width: 760px;
  }

  .markdown-body h1, .markdown-body h2, .markdown-body h3,
  .markdown-body h4, .markdown-body h5, .markdown-body h6 {
    margin: 1.4em 0 0.5em;
    line-height: 1.3;
    font-weight: 600;
  }

  .markdown-body h1 { font-size: 1.6em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  .markdown-body h2 { font-size: 1.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
  .markdown-body h3 { font-size: 1.1em; }

  .markdown-body p { margin: 0.75em 0; }

  .markdown-body a { color: var(--accent-hover); text-decoration: none; }
  .markdown-body a:hover { text-decoration: underline; }

  .markdown-body code {
    font-family: var(--mono);
    font-size: 0.875em;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
  }

  .markdown-body pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    overflow-x: auto;
    margin: 1em 0;
  }

  .markdown-body pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 0.85em;
  }

  .markdown-body blockquote {
    border-left: 3px solid var(--accent);
    margin: 1em 0;
    padding: 4px 16px;
    color: var(--muted);
  }

  .markdown-body ul, .markdown-body ol {
    margin: 0.75em 0;
    padding-left: 1.6em;
  }

  .markdown-body li { margin: 0.3em 0; }

  .markdown-body table {
    border-collapse: collapse;
    width: 100%;
    margin: 1em 0;
    font-size: 0.9em;
  }

  .markdown-body th, .markdown-body td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }

  .markdown-body th { background: var(--surface); font-weight: 600; }
  .markdown-body tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }

  .markdown-body img { max-width: 100%; border-radius: var(--radius); }

  /* Raw view */
  .raw-content {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Responsive */
  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .panel-left { border-right: none; border-bottom: 1px solid var(--border); max-height: 50vh; }
  }
</style>
</head>
<body>

<header>
  <h1>MarkItDown</h1>
  <span class="badge">microsoft/markitdown</span>
</header>

<main>
  <div class="panel-left">
    <div class="section">
      <div class="section-label">Upload File</div>
      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" />
        <span class="dropzone-icon">📄</span>
        <div class="dropzone-text">
          <strong>Click to browse</strong> or drag &amp; drop<br>
          PDF, DOCX, PPTX, XLSX, HTML, images, audio…
        </div>
        <div class="file-selected" id="fileLabel"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Convert URL</div>
      <div class="url-row">
        <input type="text" id="urlInput" placeholder="https://example.com/doc.pdf" />
      </div>
    </div>

    <div class="section">
      <div class="section-label">Backend</div>
      <div class="backend-row">
        <label class="backend-toggle" for="useCloudflare">
          <input type="checkbox" id="useCloudflare" />
          <span>Use Cloudflare</span>
        </label>
        <div class="backend-config" id="cloudflareConfig">
          <input type="text" id="cloudflareUrlInput" placeholder="https://your-worker.workers.dev" />
          <div class="backend-hint">Enter the deployed Worker URL, or your local wrangler dev URL while testing.</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div id="status" class="status"></div>
      <button class="btn btn-primary convert-btn" id="convertBtn">Convert</button>
    </div>
  </div>

  <div class="panel-right">
    <div class="preview-header">
      <div class="preview-header-left">
        <span class="preview-label">Output</span>
        <div class="tab-group" id="tabGroup" style="display:none">
          <div class="tab active" data-tab="rendered">Rendered</div>
          <div class="tab" data-tab="raw">Raw</div>
        </div>
      </div>
      <div class="preview-actions">
        <span class="char-count" id="charCount"></span>
        <button class="btn btn-secondary" id="copyBtn" style="display:none" onclick="copyMd()">Copy</button>
        <button class="btn btn-secondary" id="downloadBtn" style="display:none" onclick="downloadMd()">Download .md</button>
      </div>
    </div>
    <div class="preview-content" id="previewContent">
      <div class="preview-empty">
        <span class="preview-empty-icon">⬡</span>
        <p>Upload a file or enter a URL to convert</p>
      </div>
    </div>
  </div>
</main>

<script>
  let currentMd = '';
  let currentTab = 'rendered';
  let currentFilename = 'output';
  const localBackendBase = '/api';
  const cloudflareUrlKey = 'markitdown.cloudflareUrl';
  const cloudflareEnabledKey = 'markitdown.useCloudflare';

  const fileInput = document.getElementById('fileInput');
  const fileLabel = document.getElementById('fileLabel');
  const urlInput = document.getElementById('urlInput');
  const convertBtn = document.getElementById('convertBtn');
  const status = document.getElementById('status');
  const previewContent = document.getElementById('previewContent');
  const tabGroup = document.getElementById('tabGroup');
  const downloadBtn = document.getElementById('downloadBtn');
  const copyBtn = document.getElementById('copyBtn');
  const charCount = document.getElementById('charCount');
  const dropzone = document.getElementById('dropzone');
  const useCloudflare = document.getElementById('useCloudflare');
  const cloudflareConfig = document.getElementById('cloudflareConfig');
  const cloudflareUrlInput = document.getElementById('cloudflareUrlInput');

  function loadBackendPrefs() {
    useCloudflare.checked = localStorage.getItem(cloudflareEnabledKey) === 'true';
    cloudflareUrlInput.value = localStorage.getItem(cloudflareUrlKey) || '';
    syncBackendUi();
  }

  function syncBackendUi() {
    cloudflareConfig.classList.toggle('show', useCloudflare.checked);
    if (!useCloudflare.checked) {
      clearStatus();
    }
  }

  function saveBackendPrefs() {
    localStorage.setItem(cloudflareEnabledKey, useCloudflare.checked ? 'true' : 'false');
    localStorage.setItem(cloudflareUrlKey, cloudflareUrlInput.value.trim());
  }

  function getApiBase() {
    if (!useCloudflare.checked) return localBackendBase;
    return cloudflareUrlInput.value.trim().replace(/\/+$/, '');
  }

  function makeApiUrl(path) {
    const base = getApiBase();
    return `${base}${path}`;
  }

  function requireCloudflareUrl() {
    if (!useCloudflare.checked) return true;
    const base = getApiBase();
    if (!base) {
      setStatus('error', 'Enter a Cloudflare Worker URL');
      return false;
    }
    if (!/^https?:\/\//i.test(base) && !base.startsWith('http://127.0.0.1') && !base.startsWith('http://localhost')) {
      setStatus('error', 'Cloudflare backend needs a full http or https URL');
      return false;
    }
    return true;
  }

  loadBackendPrefs();

  // Drag and drop
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) setFile(f);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) setFile(fileInput.files[0]);
  });

  function setFile(f) {
    fileInput._selectedFile = f;
    currentFilename = f.name.replace(/\.[^.]+$/, '');
    fileLabel.textContent = f.name;
    urlInput.value = '';
  }

  urlInput.addEventListener('input', () => {
    if (urlInput.value.trim()) {
      fileInput._selectedFile = null;
      fileLabel.textContent = '';
      fileInput.value = '';
    }
  });

  useCloudflare.addEventListener('change', () => {
    syncBackendUi();
    saveBackendPrefs();
  });

  cloudflareUrlInput.addEventListener('input', () => {
    saveBackendPrefs();
  });

  // Tab switching
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      currentTab = t.dataset.tab;
      renderOutput();
    });
  });

  function setStatus(type, msg) {
    status.className = `status show ${type}`;
    status.innerHTML = type === 'loading' ? `<span class="spinner"></span>${msg}` : msg;
  }

  function clearStatus() {
    status.className = 'status';
    status.textContent = '';
  }

  function renderOutput() {
    if (!currentMd) return;
    if (currentTab === 'rendered') {
      previewContent.innerHTML = `<div class="markdown-body">${marked.parse(currentMd)}</div>`;
    } else {
      previewContent.innerHTML = `<div class="raw-content">${escapeHtml(currentMd)}</div>`;
    }
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showResult(md, filename) {
    currentMd = md;
    if (filename) currentFilename = filename;
    currentTab = 'rendered';
    charCount.textContent = md.length ? `${md.length.toLocaleString()} chars` : '';
    tabGroup.style.display = '';
    document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x.dataset.tab === currentTab));
    downloadBtn.style.display = md.length ? '' : 'none';
    copyBtn.style.display = md.length ? '' : 'none';
    if (!md.length) {
      previewContent.innerHTML = `<div class="preview-empty"><span class="preview-empty-icon">⚠️</span><p>No text extracted — file may be a scanned/image-only PDF requiring OCR, or the URL returned no parseable content.</p></div>`;
      clearStatus();
      return;
    }
    renderOutput();
    clearStatus();
  }

  convertBtn.addEventListener('click', async () => {
    const file = fileInput._selectedFile;
    const url = urlInput.value.trim();

    if (!file && !url) {
      setStatus('error', 'Provide a file or URL');
      return;
    }

    convertBtn.disabled = true;

    if (file) {
      if (!requireCloudflareUrl()) {
        convertBtn.disabled = false;
        return;
      }
      setStatus('loading', `Converting ${file.name}…`);
      const fd = new FormData();
      fd.append('file', file);
      try {
        const res = await fetch(makeApiUrl('/convert'), { method: 'POST', body: fd });
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        const data = await res.json();
        const md = data.success != null ? (data.markdown ?? '') : (data.markdown || data.result || data.text || JSON.stringify(data));
        showResult(md, currentFilename);
      } catch (e) {
        setStatus('error', e.message);
      }
    } else {
      if (!requireCloudflareUrl()) {
        convertBtn.disabled = false;
        return;
      }
      setStatus('loading', 'Fetching and converting…');
      try {
        const res = await fetch(makeApiUrl(`/convert-url?url=${encodeURIComponent(url)}`), { method: 'POST' });
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        const data = await res.json();
        const md = data.success != null ? (data.markdown ?? '') : (data.markdown || data.result || data.text || JSON.stringify(data));
        const urlHost = new URL(url).hostname.replace(/\./g, '-');
        showResult(md, urlHost);
      } catch (e) {
        setStatus('error', e.message);
      }
    }

    convertBtn.disabled = false;
  });

  function downloadMd() {
    const blob = new Blob([currentMd], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${currentFilename}.md`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  async function copyMd() {
    await navigator.clipboard.writeText(currentMd);
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  }
</script>
</body>
</html>
